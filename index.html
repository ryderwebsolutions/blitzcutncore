<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blitz Cut N Core</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b1220;
        color: #f5f7ff;
      }

      main {
        width: min(720px, calc(100% - 3rem));
        text-align: center;
        background: rgba(8, 13, 24, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        padding: 3rem 2rem;
        box-shadow: 0 24px 50px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      p {
        margin: 1rem 0 0;
        color: #ced6f2;
        font-size: 1.05rem;
        line-height: 1.6;
      }

      a {
        display: inline-block;
        margin-top: 1.75rem;
        padding: 0.75rem 1.25rem;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 600;
        background: #7fa8ff;
        color: #0a1325;
      }

      a:hover,
      a:focus-visible {
        background: #a9c5ff;
        outline: 2px solid #d9e5ff;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Blitz Cut N Core</h1>
      <p>
        Welcome to Blitz Cut N Core. We build clean, fast digital experiences that help your brand stand out.
      </p>
      <a href="mailto:hello@blitzcutncore.com">Get in touch</a>
    </main>
  </body>
</html>
